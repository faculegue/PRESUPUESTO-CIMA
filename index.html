* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

#app {

  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  background: white;
  position: relative;
  box-shadow: 0 0 20px rgba(0,0,0,0.05);
}

/* Header */
.header {
  background: #1e3a5f;
  color: white;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  z-index: 10;
}
.header-title { font-size: 14px; font-weight: 600; letter-spacing: 1px; }
.header-back { cursor: pointer; padding: 4px; display: flex; }
.header-back svg { width: 22px; height: 22px; }
.header-info { font-size: 11px; opacity: 0.8; }

/* Main content */
.main {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  min-height: 0; /* permite que flex shrink al contenedor */
}

.bottom-nav {
  display: flex;
  background: white;
  border-top: 1px solid #e5e5e5;

}
.nav-item {
  flex: 1;
  padding: 10px 8px;
  text-align: center;
  cursor: pointer;
  color: #888;
  transition: color 0.2s;
}
.nav-item.active { color: #1e3a5f; }
.nav-item svg { width: 22px; height: 22px; display: block; margin: 0 auto 2px; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; }

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 6px;
}

  flex-direction: column;
  gap: 3px;
}
.logo-bars span {
  display: block;

  background: #888;
  border-radius: 1px;
}
.logo-text {
  font-size: 38px;
  font-weight: 600;

// ===== PERSISTENCIA =====
// Cambiá este número cada vez que modifiques BOTONES_DEFAULT
// para que las apps ya instaladas se actualicen automáticamente.
const BOTONES_DEFAULT_VERSION = 2;

function guardar() {
  const data = {
    botonesVersion: BOTONES_DEFAULT_VERSION,
    valorUB: state.valorUB,
    valorActo: state.valorActo,
    practicasModif: state.practicasModif,
    practicasPropias: state.practicasPropias,
    practicasEliminadas: state.practicasEliminadas,
    botones: state.botones,
    historial: state.historial
  };
  try {
    localStorage.setItem('legue_data', JSON.stringify(data));
  } catch(e) { console.error('Error guardando:', e); }
}

function cargar() {
  try {
    const saved = localStorage.getItem('legue_data');
    if (saved) {
      const data = JSON.parse(saved);
      Object.assign(state, data);

      // ¿Cambió la versión de la botonera default?
      // Si sí, actualizamos los botones SOLO si el usuario nunca los modificó.
      // Si los modificó, respetamos sus cambios.
      const versionGuardada = data.botonesVersion || 0;
      if (versionGuardada < BOTONES_DEFAULT_VERSION) {
        state.botones = JSON.parse(JSON.stringify(BOTONES_DEFAULT));
        guardar();
        // Avisar al usuario después de que la app cargue
        setTimeout(() => {
          toast(`✓ Botonera actualizada a v${BOTONES_DEFAULT_VERSION}`);
        }, 500);
      }
    } else {
      // Primera vez: cargar botones default
      state.botones = JSON.parse(JSON.stringify(BOTONES_DEFAULT));
      guardar();
    }
    // Limpiar historial > 30 días
    const ahora = Date.now();
    const limite = 30 * 24 * 60 * 60 * 1000;
    state.historial = (state.historial || []).filter(h => ahora - h.timestamp < limite);
  } catch(e) {
    console.error('Error cargando:', e);
    state.botones = JSON.parse(JSON.stringify(BOTONES_DEFAULT));
  }
}

// ===== HELPERS =====
function getPractica(codigo) {
  // Si está eliminada, no existe
  if ((state.practicasEliminadas || []).includes(codigo)) return null;
  const propia = state.practicasPropias.find(p => p.codigo === codigo);
  if (propia) return propia;
  const nbu = PRACTICAS_NBU.find(p => p.codigo === codigo);
  if (!nbu) return null;
  // Aplicar override si existe
  const ubModif = state.practicasModif[codigo];
  if (ubModif !== undefined) return { ...nbu, ub: ubModif, modificada: true };
  return nbu;
}

function getUB(codigo) {
  const p = getPractica(codigo);
  return p ? p.ub : 0;
}

function calcPrecio(codigo) {
  return getUB(codigo) * state.valorUB;
}

function calcTotal() {
  let total = 0;
  for (const cod of state.presupuesto.practicas) {
    total += calcPrecio(cod);
  }
  if (state.presupuesto.incluyeActo) total += state.valorActo;
  return total;
}

function fmtNum(n) {
  return new Intl.NumberFormat('es-AR').format(Math.round(n));
}

function fmtUB(ub) {
  return ub.toFixed(1);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function navegar(pantalla) {
  state.pantalla = pantalla;
  render();
}

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  let html = '';

  // Pantalla actual
  switch(state.pantalla) {
    case 'inicio': html = renderInicio(); break;
    case 'hacer': html = renderHacer(); break;
    case 'seleccion': html = renderSeleccion(); break;
    case 'preview': html = renderPreview(); break;
    case 'historial': html = renderHistorial(); break;
    case 'config': html = renderConfig(); break;
    case 'config-botones': html = renderConfigBotones(); break;
    case 'config-nomenclador': html = renderConfigNomenclador(); break;
    case 'config-valores': html = renderConfigValores(); break;
    case 'config-backup': html = renderConfigBackup(); break;
  }

  // Bottom nav (solo en pantallas principales)
  const showNav = ['inicio', 'historial', 'config'].includes(state.pantalla);
  if (showNav) {
    html += `
      <nav class="bottom-nav">
        <div class="nav-item ${state.pantalla === 'inicio' ? 'active' : ''}" onclick="navegar('inicio')">
          ${iconos.home}
          <div class="nav-label">INICIO</div>
        </div>
        <div class="nav-item ${state.pantalla === 'historial' ? 'active' : ''}" onclick="navegar('historial')">
          ${iconos.history}
          <div class="nav-label">HISTORIAL</div>
        </div>
        <div class="nav-item ${state.pantalla === 'config' ? 'active' : ''}" onclick="navegar('config')">
          ${iconos.settings}
          <div class="nav-label">CONFIGURACIÓN</div>
        </div>
      </nav>
    `;
  }

  app.innerHTML = html;

  // Foco automático en NOMBRE
  if (state.pantalla === 'hacer') {
    setTimeout(() => {
      const inp = document.getElementById('input-nombre');
      if (inp) inp.focus();
    }, 50);
  }
}

function renderSeleccion() {
  const p = state.presupuesto;
  const fecha = p.fecha.toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric' }).toUpperCase();

  // Asegurar que existe el array
  if (!p.botonesActivos) p.botonesActivos = [];

  let botonesHTML = state.botones.map(b => `
    <button class="btn-atajo ${botonesActivosSet.has(b.sigla) ? 'active' : ''}" onclick="toggleBoton(${state.botones.indexOf(b)})">
      ${b.sigla}
    </button>
  `).join('');

  let practicasHTML = '';
  if (p.practicas.length === 0) {
    practicasHTML = '<div class="empty-state">Tocá un botón para agregar prácticas</div>';
  } else {
    practicasHTML = p.practicas.map(cod => {
      const pr = getPractica(cod);
      if (!pr) return '';
      return `
        <div class="practica-row">
          <span class="nombre">${pr.nombre}</span>
          <span class="precio">${fmtUB(pr.ub)} UB · $${fmtNum(pr.ub * state.valorUB)}</span>
          <button class="quitar" onclick="quitarPractica(${cod})">×</button>
        </div>
      `;
    }).join('');
  }

  const total = calcTotal();

  return `
    <header class="header">
      <div class="header-back" onclick="if(confirm('¿Cancelar presupuesto?')) navegar('inicio')">${iconos.back}</div>
      <div class="header-title">SELECCION DE PRACTICAS</div>
      <div style="width:30px"></div>
    </header>
    <main class="main">
      <div class="info-card">
        <div class="row"><span class="label">Paciente:</span> <strong>${p.nombre}</strong></div>
        <div class="row"><span class="label">Fecha:</span> <strong>${fecha}</strong></div>
        <div class="row"><span class="label">Acto profesional:</span> <strong>${p.incluyeActo ? '✓ Incluido' : '✗ No incluido'}</strong></div>
      </div>

      <div class="botonera">${botonesHTML}</div>

      <div class="seleccionadas">
        <div class="seleccionadas-header">
          <span>SELECCIONADAS (${p.practicas.length})</span>
          <strong>TOTAL: $${fmtNum(total)}</strong>
        </div>
        ${practicasHTML}
      </div>

      <div class="actions-bottom">
        <button class="btn-agregar" onclick="abrirNomenclador()">
          ${iconos.plus} AGREGAR MAS
        </button>
        <button class="btn-generar" onclick="generarPresupuesto()">
          GENERAR <span class="kbd-badge">F8</span>
        </button>
      </div>
    </main>
  `;
}

function toggleBoton(idx) {
  const b = state.botones[idx];
  const p = state.presupuesto;
  if (!p.botonesActivos) p.botonesActivos = [];

  const yaActivo = p.botonesActivos.includes(b.sigla);

  if (yaActivo) {
    // === DESACTIVAR ===
    // Quitar el botón de la lista de activos
    p.botonesActivos = p.botonesActivos.filter(s => s !== b.sigla);

    // Calcular qué prácticas siguen "respaldadas" por OTROS botones activos
    const codigosRespaldados = new Set();
    for (const sigla of p.botonesActivos) {
      const otro = state.botones.find(bt => bt.sigla === sigla);
      if (otro) otro.codigos.forEach(c => codigosRespaldados.add(c));
    }

    // Quitar SOLO las prácticas de este botón que no están respaldadas
    p.practicas = p.practicas.filter(c => !b.codigos.includes(c) || codigosRespaldados.has(c));
  } else {
    // === ACTIVAR ===
    p.botonesActivos.push(b.sigla);
    // Agregar las prácticas que falten (sin duplicar)
    for (const cod of b.codigos) {
      if (!p.practicas.includes(cod) && getPractica(cod)) {
        p.practicas.push(cod);
      }
    }
  }
  render();
}

function quitarPractica(cod) {
  const p = state.presupuesto;
  p.practicas = p.practicas.filter(c => c !== cod);

  // Si la práctica era parte de algún botón activo, desactivar ese botón
  // (porque su contenido ya no está completo)
  if (p.botonesActivos) {
    p.botonesActivos = p.botonesActivos.filter(sigla => {
      const b = state.botones.find(bt => bt.sigla === sigla);
      return b && !b.codigos.includes(cod);
    });
  }
  render();
}

// ===== NOMENCLADOR (modal de selección) =====

let _busquedaNomenclador = '';
let _modoNomenclador = 'agregar'; // 'agregar' o 'editar'

function abrirNomenclador() {
  _busquedaNomenclador = '';
  _modoNomenclador = 'agregar';
  mostrarModalNomenclador();
}

function mostrarModalNomenclador() {
  let modal = document.getElementById('modal-nomen');
  if (modal) modal.remove();

  modal = document.createElement('div');
  modal.id = 'modal-nomen';
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h2>${_modoNomenclador === 'editar' ? 'NOMENCLADOR' : 'AGREGAR PRACTICA'}</h2>
        <button class="modal-close" onclick="cerrarModalNomen()">×</button>
      </div>
      <div class="modal-body" style="padding: 0;">
        <div style="padding: 12px;">
          <div class="search-box">
            <span class="search-icon">${iconos.search}</span>
            <input id="input-buscar" type="text" placeholder="BUSCAR" value="${_busquedaNomenclador}" oninput="buscarNomen(this.value)">
          </div>
        </div>
        <div class="tabla-header ${_modoNomenclador === 'editar' ? 'editable' : ''}">
          <span>Codigo</span>
          <span>Nombre</span>
          <span style="text-align:center;">UB</span>
          ${_modoNomenclador === 'editar' ? '<span></span>' : ''}
        </div>
        <div id="tabla-resultados" style="max-height: 50vh; overflow-y: auto;"></div>
        ${_modoNomenclador === 'editar' ? `
          <button class="btn-fab" onclick="agregarPracticaPropia()" style="position: sticky; bottom: 16px; margin-left: auto; display: flex;">
            ${iconos.plus}
          </button>
        ` : ''}
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  renderTablaNomen();
  setTimeout(() => document.getElementById('input-buscar').focus(), 50);
}

function buscarNomen(texto) {
  _busquedaNomenclador = texto;
  renderTablaNomen();
}

function renderTablaNomen() {
  const cont = document.getElementById('tabla-resultados');
  if (!cont) return;

  const q = _busquedaNomenclador.toUpperCase().trim();
  const seleccionadas = new Set(state.presupuesto.practicas);

  // Combinar NBU + propias, excluyendo eliminadas
  const eliminadas = new Set(state.practicasEliminadas || []);
  let todas = [...PRACTICAS_NBU, ...state.practicasPropias].filter(p => !eliminadas.has(p.codigo));
  // Aplicar overrides
  todas = todas.map(p => {
    const ubModif = state.practicasModif[p.codigo];
    if (ubModif !== undefined && !p.propia) return { ...p, ub: ubModif, modificada: true };
    return p;
  });

  let resultados = todas;
  if (q) {
    resultados = todas.filter(p =>
      p.nombre.toUpperCase().includes(q) ||
      String(p.codigo).includes(q)
    );
  }

  // Limitar a primeros 100 para performance
  const limite = 100;
  const total = resultados.length;
  resultados = resultados.slice(0, limite);

  if (resultados.length === 0) {
    cont.innerHTML = '<div class="empty-state">Sin resultados</div>';
    return;
  }

  let html = resultados.map(p => {
    const propia = state.practicasPropias.some(pp => pp.codigo === p.codigo);
    const modif = state.practicasModif[p.codigo] !== undefined;
    let cls = 'tabla-row';
    if (_modoNomenclador === 'editar') cls += ' editable';
    if (propia) cls += ' propia';
    else if (modif) cls += ' modificada';
    if (seleccionadas.has(p.codigo) && _modoNomenclador === 'agregar') cls += ' seleccionada';

    const onclick = _modoNomenclador === 'agregar'
      ? `onclick="agregarDelNomen(${p.codigo})"`
      : `onclick="editarPracticaUB(${p.codigo})"`;

    return `
      <div class="${cls}" ${onclick}>
        <span class="codigo">${propia ? '★' : p.codigo}</span>
        <span class="nombre-prac">${p.nombre}${propia ? '<span class="badge-propia">PROPIA</span>' : ''}${modif ? '<span class="badge-mod">✏️</span>' : ''}</span>
        <span class="ub">${fmtUB(p.ub)}</span>
        ${_modoNomenclador === 'editar' ? `<button class="btn-edit-row" onclick="event.stopPropagation();editarPracticaUB(${p.codigo})">${iconos.edit}</button>` : ''}
      </div>
    `;
  }).join('');

  if (total > limite) {
    html += `<div class="empty-state">Mostrando ${limite} de ${total}. Refina tu búsqueda.</div>`;
  }
  cont.innerHTML = html;
}

function agregarDelNomen(cod) {
  if (!state.presupuesto.practicas.includes(cod)) {
    state.presupuesto.practicas.push(cod);
    toast('Práctica agregada');
  } else {
    toast('Ya estaba agregada');
  }
  renderTablaNomen();
  render(); // refrescar fondo
}

function cerrarModalNomen() {
  const m = document.getElementById('modal-nomen');
  if (m) m.remove();
  render();
}

function editarPracticaUB(cod) {
  const p = getPractica(cod);
  if (!p) return;
  const nuevo = prompt(`Modificar UB de "${p.nombre}"\nValor actual: ${fmtUB(p.ub)}`, fmtUB(p.ub));
  if (nuevo === null) return;
  const num = parseFloat(nuevo.replace(',', '.'));
  if (isNaN(num) || num < 0) {
    toast('Valor inválido');
    return;
  }

  // ¿Es propia?
  const idx = state.practicasPropias.findIndex(pp => pp.codigo === cod);
  if (idx >= 0) {
    state.practicasPropias[idx].ub = num;
  } else {
    state.practicasModif[cod] = num;
  }
  guardar();
  renderTablaNomen();
  toast('UB actualizado');
}

function agregarPracticaPropia() {
  const nombre = prompt('Nombre de la nueva práctica:');
  if (!nombre || !nombre.trim()) return;
  const ubStr = prompt('Valor UB (ej: 11.0):', '1.0');
  if (ubStr === null) return;
  const ub = parseFloat(ubStr.replace(',', '.'));
  if (isNaN(ub) || ub < 0) {
    toast('UB inválido');
    return;
  }
  // Generar código nuevo (a partir de 90000)
  const codigosUsados = new Set([
    ...PRACTICAS_NBU.map(p => p.codigo),
    ...state.practicasPropias.map(p => p.codigo)
  ]);
  let codigo = 90001;
  while (codigosUsados.has(codigo)) codigo++;

  state.practicasPropias.push({
    codigo: codigo,
    nombre: nombre.trim().toUpperCase(),
    ub: ub,
    tipo: 'PROPIA',
    propia: true
  });
  guardar();
  renderTablaNomen();
  if (typeof renderTablaCfg === 'function') renderTablaCfg();
  toast('Práctica agregada');
}

function eliminarPractica(codigo) {
  const p = getPractica(codigo);
  if (!p) return;
  const esPropia = state.practicasPropias.some(pp => pp.codigo === codigo);

  let mensaje;
  if (esPropia) {
    mensaje = `¿Eliminar definitivamente la práctica propia?\n\n"${p.nombre}"\n\nEsta acción no se puede deshacer.`;
  } else {
    mensaje = `¿Eliminar la práctica del nomenclador?\n\n"${p.nombre}"\n\nPodés restaurarla después desde el botón "RESTAURAR TODAS".`;
  }

  if (!confirm(mensaje)) return;

  if (esPropia) {
    // Borrar definitivamente
    state.practicasPropias = state.practicasPropias.filter(pp => pp.codigo !== codigo);
    // También limpiar override si tenía
    delete state.practicasModif[codigo];
  } else {
    // Marcar como eliminada
    if (!state.practicasEliminadas) state.practicasEliminadas = [];
    if (!state.practicasEliminadas.includes(codigo)) {
      state.practicasEliminadas.push(codigo);
    }
  }

  // Si la práctica está en algún botón, sacarla de ahí también
  state.botones = state.botones.map(b => ({
    ...b,
    codigos: b.codigos.filter(c => c !== codigo)
  })).filter(b => b.codigos.length > 0); // eliminar botones que se quedaron vacíos

  guardar();
  toast('Práctica eliminada');

  // Refrescar la pantalla actual
  if (state.pantalla === 'config-nomenclador') {
    render();
    setTimeout(() => renderTablaCfg(), 10);
  } else {
    renderTablaNomen();
  }
}

function restaurarEliminadas() {
  const cant = (state.practicasEliminadas || []).length;
  if (cant === 0) return;
  if (!confirm(`¿Restaurar las ${cant} práctica(s) eliminada(s)?`)) return;
  state.practicasEliminadas = [];
  guardar();
  toast(`✓ ${cant} práctica(s) restaurada(s)`);
  render();
  setTimeout(() => renderTablaCfg(), 10);
}

function generarPresupuesto() {
  if (state.presupuesto.practicas.length === 0) {
    toast('Agregá al menos una práctica');
    return;
  }
  navegar('preview');
}

function renderPreview() {
  const p = state.presupuesto;
  const fecha = p.fecha;
  const fechaTexto = fecha.toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric' }).toUpperCase().replace('.', '');
  const dd = String(fecha.getDate()).padStart(2, '0');
  const mm = String(fecha.getMonth() + 1).padStart(2, '0');

async function generarBlob() {
  const node = document.getElementById('presupuesto-final');
  const canvas = await html2canvas(node, {
    backgroundColor: '#ffffff',
    scale: 2,
    useCORS: true
  });
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

function getFilename() {
  const p = state.presupuesto;
  const dd = String(p.fecha.getDate()).padStart(2, '0');
  const mm = String(p.fecha.getMonth() + 1).padStart(2, '0');
  return `presupuesto ${p.nombre} ${dd}${mm}.png`;
}

async function descargarPNG() {
  try {
    toast('Generando imagen...');
    const blob = await generarBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = getFilename();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('✓ Imagen descargada');
  } catch(e) {
    console.error(e);
    toast('Error al generar imagen');
  }
}

async function compartirWhatsApp() {
  try {
    toast('Generando imagen...');
    const blob = await generarBlob();
    const file = new File([blob], getFilename(), { type: 'image/png' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'Presupuesto ' + LAB_NOMBRE,
        text: state.presupuesto.nombre
      });
      toast('✓ Compartido');
    } else {
      // Fallback: descargar
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = getFilename();
      a.click();
      URL.revokeObjectURL(url);
      toast('Descargada. Abrí WhatsApp y enviá la imagen.');
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      console.error(e);
      toast('Error al compartir');
    }
  }
}

function guardarYSalir() {
  // Guardar en historial
  const p = state.presupuesto;
  state.historial.unshift({
    timestamp: Date.now(),
    nombre: p.nombre,
    fecha: p.fecha.toISOString(),
    incluyeActo: p.incluyeActo,
    practicas: [...p.practicas],
    total: calcTotal(),
    valorUB: state.valorUB,
    valorActo: state.valorActo
  });
  // Mantener máximo 100
  if (state.historial.length > 100) state.historial = state.historial.slice(0, 100);
  guardar();
  toast('✓ Guardado en historial');
  navegar('inicio');
}

function exportarDatos() {
  try {
    const data = localStorage.getItem('legue_data');
    if (!data) {
      toast('No hay datos para exportar');
      return;
    }
    const parsed = JSON.parse(data);

    const ahora = new Date();
    const dd = String(ahora.getDate()).padStart(2, '0');
    const mm = String(ahora.getMonth() + 1).padStart(2, '0');
    const yyyy = ahora.getFullYear();
    const labShort = (typeof LAB_SHORT_NAME !== 'undefined' && LAB_SHORT_NAME) ? LAB_SHORT_NAME.toLowerCase() : 'lab';
    const filename = `${labShort}-backup ${dd}-${mm}-${yyyy}.json`;

    const blob = new Blob([JSON.stringify(parsed, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    toast('✓ Backup descargado');
  } catch(e) {
    console.error('Error exportando:', e);
    toast('Error al exportar');
  }
}

function importarDatos(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const contenido = e.target.result;
      const data = JSON.parse(contenido);

      const camposEsperados = ['valorUB', 'valorActo', 'botones'];
      const tieneEstructura = camposEsperados.some(c => c in data);
      if (!tieneEstructura) {
        toast('El archivo no parece ser un backup válido');
        return;
      }

      const stats = [];
      if (Array.isArray(data.botones)) stats.push(`${data.botones.length} botones`);
      if (Array.isArray(data.practicasPropias)) stats.push(`${data.practicasPropias.length} prácticas propias`);
      if (Array.isArray(data.historial)) stats.push(`${data.historial.length} presupuestos en historial`);

      const mensaje = `¿Reemplazar la configuración actual con el backup?\n\nEl backup contiene:\n  • ${stats.join('\n  • ')}\n\nEsta acción no se puede deshacer.`;
      if (!confirm(mensaje)) {
        event.target.value = '';
        return;
      }

      localStorage.setItem('legue_data', JSON.stringify(data));
      cargar();
      toast('✓ Datos importados correctamente');
      render();
    } catch(err) {
      console.error('Error importando:', err);
      toast('Error: archivo inválido');
    }
    event.target.value = '';
  };
  reader.onerror = function() {
    toast('Error al leer el archivo');
    event.target.value = '';
  };
  reader.readAsText(file);
}

function renderTablaCfg() {
  const cont = document.getElementById('tabla-cfg');
  if (!cont) return;
  const q = _busquedaCfg.toUpperCase().trim();
  const eliminadas = new Set(state.practicasEliminadas || []);

  let todas = [...PRACTICAS_NBU, ...state.practicasPropias].filter(p => !eliminadas.has(p.codigo));
  todas = todas.map(p => {
    const ubModif = state.practicasModif[p.codigo];
    if (ubModif !== undefined && !p.propia) return { ...p, ub: ubModif, modificada: true };
    return p;
  });

  let resultados = todas;
  if (q) {
    resultados = todas.filter(p =>
      p.nombre.toUpperCase().includes(q) || String(p.codigo).includes(q)
    );
  }

  const limite = 80;
  const total = resultados.length;
  resultados = resultados.slice(0, limite);

  if (resultados.length === 0) {
    cont.innerHTML = '<div class="empty-state">Sin resultados</div>';
    return;
  }

  let html = resultados.map(p => {
    const propia = state.practicasPropias.some(pp => pp.codigo === p.codigo);
    const modif = state.practicasModif[p.codigo] !== undefined;
    let cls = 'tabla-row editable-2btn';
    if (propia) cls += ' propia';
    else if (modif) cls += ' modificada';

    return `
      <div class="${cls}">
        <span class="codigo">${propia ? '★' : p.codigo}</span>
        <span class="nombre-prac" onclick="editarPracticaUB(${p.codigo})">${p.nombre}${propia ? '<span class="badge-propia">PROPIA</span>' : ''}${modif ? '<span class="badge-mod">✏️</span>' : ''}</span>

  }).join('');

  if (total > limite) {
    html += `<div class="empty-state">Mostrando ${limite} de ${total}. Refina tu búsqueda.</div>`;
  }
  cont.innerHTML = html;
}

// === Drag & Drop para reordenar botones ===
let _dragIdx = null;
function onDragStart(e, idx) {
  _dragIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  return false;
}
function onDragEnter(e, idx) {
  if (_dragIdx === null || _dragIdx === idx) return;
  const target = e.currentTarget;
  target.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDragEnd(e) {
  document.querySelectorAll('.boton-draggable').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
  _dragIdx = null;
}
function onDrop(e, idx) {
  e.preventDefault();
  e.stopPropagation();
  if (_dragIdx === null || _dragIdx === idx) return;

  const from = _dragIdx;
  const to = idx;
  const item = state.botones.splice(from, 1)[0];
  state.botones.splice(to, 0, item);

  guardar();
  _dragIdx = null;
  render();
}

// === Touch drag (para móviles) ===
let _touchDrag = { idx: null, startY: 0, el: null, ghost: null, currentTarget: null };
function onTouchStart(e, idx) {
  // Solo iniciar drag si toca el handle
  const target = e.target.closest('.drag-handle');
  if (!target) return;

  e.preventDefault();
  _touchDrag.idx = idx;
  _touchDrag.startY = e.touches[0].clientY;
  _touchDrag.el = e.currentTarget;
  _touchDrag.el.classList.add('dragging');

  // Crear ghost
  const ghost = _touchDrag.el.cloneNode(true);
  ghost.style.position = 'fixed';
  ghost.style.left = '8px';
  ghost.style.right = '8px';
  ghost.style.top = (e.touches[0].clientY - 30) + 'px';
  ghost.style.zIndex = '9999';
  ghost.style.opacity = '0.85';
  ghost.style.pointerEvents = 'none';
  ghost.style.boxShadow = '0 8px 24px rgba(0,0,0,0.25)';
  ghost.classList.add('touch-ghost');
  document.body.appendChild(ghost);
  _touchDrag.ghost = ghost;
}
function onTouchMove(e) {
  if (_touchDrag.idx === null) return;
  e.preventDefault();
  const y = e.touches[0].clientY;

  if (_touchDrag.ghost) {
    _touchDrag.ghost.style.top = (y - 30) + 'px';
  }

  // Detectar sobre cuál elemento está
  const elBelow = document.elementFromPoint(e.touches[0].clientX, y);
  const target = elBelow ? elBelow.closest('.boton-draggable') : null;

  document.querySelectorAll('.boton-draggable').forEach(el => el.classList.remove('drag-over'));
  if (target && target !== _touchDrag.el) {
    target.classList.add('drag-over');
    _touchDrag.currentTarget = target;
  } else {
    _touchDrag.currentTarget = null;
  }
}
function onTouchEnd(e) {
  if (_touchDrag.idx === null) return;

  if (_touchDrag.currentTarget) {
    const to = parseInt(_touchDrag.currentTarget.dataset.idx);
    const from = _touchDrag.idx;
    if (from !== to && !isNaN(to)) {
      const item = state.botones.splice(from, 1)[0];
      state.botones.splice(to, 0, item);
      guardar();
    }
  }

  // Limpiar
  if (_touchDrag.ghost) _touchDrag.ghost.remove();
  document.querySelectorAll('.boton-draggable').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
  _touchDrag = { idx: null, startY: 0, el: null, ghost: null, currentTarget: null };
  render();
}

function nuevoBoton() {
  editarBoton(-1);
}

function editarBoton(idx) {
  const esNuevo = idx === -1;
  const b = esNuevo
    ? { sigla: '', nombre: '', codigos: [] }
    : { ...state.botones[idx], codigos: [...state.botones[idx].codigos] };

  abrirEditorBoton(b, esNuevo, idx);
}

function abrirEditorBoton(boton, esNuevo, idx) {
  // Guardar datos en window para acceso desde el modal
  window._edBoton = {
    sigla: boton.sigla,
    nombre: boton.nombre,
    codigos: [...boton.codigos],
    busq: ''
  };
  window._edEsNuevo = esNuevo;
  window._edIdx = idx;

  let modal = document.getElementById('modal-editor-boton');
  if (modal) modal.remove();

  modal = document.createElement('div');
  modal.id = 'modal-editor-boton';
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal" style="max-width: 440px;">
      <div class="modal-header">
        <h2>${esNuevo ? 'NUEVO BOTON' : 'EDITAR BOTON'}</h2>
        <button class="modal-close" onclick="cerrarEditorBoton()">×</button>
      </div>
      <div class="modal-body" style="padding: 0;">
        <div style="padding: 16px; border-bottom: 1px solid #eee;">
          <div class="input-row" style="margin-bottom: 12px;">
            <label>SIGLA (3-5 caracteres)</label>
            <input id="ed-sigla" type="text" maxlength="5" value="${(boton.sigla||'').replace(/"/g,'&quot;')}"
              oninput="window._edBoton.sigla=this.value.toUpperCase()" style="text-transform: uppercase; font-weight: 600; letter-spacing: 1px; text-align: center;">
          </div>
          <div class="input-row" style="margin-bottom: 0;">
            <label>NOMBRE (descriptivo)</label>
            <input id="ed-nombre" type="text" value="${(boton.nombre||'').replace(/"/g,'&quot;')}"
              oninput="window._edBoton.nombre=this.value">
          </div>
        </div>

        <div style="padding: 12px 16px 8px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">
            <label style="font-size: 12px; color: #666; letter-spacing: 0.5px; font-weight: 600;">PRÁCTICAS</label>
            <span id="ed-contador" style="font-size: 11px; color: #1e3a5f; font-weight: 600;">${boton.codigos.length} seleccionada(s)</span>
          </div>

          <div id="ed-seleccionadas" style="background: #f5f7fa; border-radius: 8px; padding: 8px; min-height: 40px; max-height: 120px; overflow-y: auto; margin-bottom: 10px;"></div>

          <div class="search-box" style="margin-bottom: 0;">
            <span class="search-icon">${iconos.search}</span>
            <input id="ed-buscar" type="text" placeholder="BUSCAR PRÁCTICA PARA AGREGAR" oninput="onBuscarEdBoton(this.value)">
          </div>
        </div>

        <div id="ed-resultados" style="max-height: 35vh; overflow-y: auto; padding: 0 8px;"></div>

        <div style="padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px;">
          <button class="btn-secondary" style="margin: 0;" onclick="cerrarEditorBoton()">CANCELAR</button>
          <button class="btn-primary" style="margin: 0;" onclick="guardarBotonEditado()">GUARDAR</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  renderEdSeleccionadas();
  renderEdResultados();

  setTimeout(() => {
    const inp = document.getElementById('ed-sigla');
    if (inp && esNuevo) inp.focus();
  }, 50);
}

function renderEdSeleccionadas() {
  const cont = document.getElementById('ed-seleccionadas');
  if (!cont) return;
  if (window._edBoton.codigos.length === 0) {
    cont.innerHTML = '<div style="text-align:center; color:#aaa; font-size: 11px; padding: 8px;">Buscá abajo y tocá una práctica para agregarla</div>';
    return;
  }
  cont.innerHTML = window._edBoton.codigos.map((cod, i) => {
    const p = getPractica(cod);
    const nombre = p ? p.nombre : `(código ${cod} no encontrado)`;
    const ub = p ? fmtUB(p.ub) : '?';
    return `
      <div style="display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; background: white; border-radius: 6px; margin-bottom: 4px; font-size: 12px; gap: 6px;">
        <span style="flex:1; line-height: 1.3;">${nombre}</span>
        <span style="color: #888; font-size: 11px; white-space: nowrap;">${ub} UB</span>
        <button onclick="quitarPracticaEd(${cod})" style="background:none; border:none; color:#c33; font-size:18px; cursor:pointer; padding: 0 4px; font-family: inherit; line-height: 1;">×</button>
      </div>
    `;
  }).join('');
}

function quitarPracticaEd(cod) {
  window._edBoton.codigos = window._edBoton.codigos.filter(c => c !== cod);
  document.getElementById('ed-contador').textContent = window._edBoton.codigos.length + ' seleccionada(s)';
  renderEdSeleccionadas();
  renderEdResultados();
}

function onBuscarEdBoton(v) {
  window._edBoton.busq = v;
  renderEdResultados();
}

function renderEdResultados() {
  const cont = document.getElementById('ed-resultados');
  if (!cont) return;
  const q = (window._edBoton.busq || '').toUpperCase().trim();

  if (!q) {
    cont.innerHTML = '<div class="empty-state" style="font-size: 11px;">Escribí en el buscador para encontrar prácticas</div>';
    return;
  }

  const eliminadas = new Set(state.practicasEliminadas || []);
  const yaSeleccionadas = new Set(window._edBoton.codigos);
  let todas = [...PRACTICAS_NBU, ...state.practicasPropias].filter(p => !eliminadas.has(p.codigo));
  todas = todas.map(p => {
    const ubModif = state.practicasModif[p.codigo];
    if (ubModif !== undefined && !p.propia) return { ...p, ub: ubModif };
    return p;
  });

  let resultados = todas.filter(p =>
    p.nombre.toUpperCase().includes(q) || String(p.codigo).includes(q)
  );

  const limite = 30;
  const total = resultados.length;
  resultados = resultados.slice(0, limite);

  if (resultados.length === 0) {
    cont.innerHTML = '<div class="empty-state" style="font-size: 11px;">Sin resultados</div>';
    return;
  }

  let html = resultados.map(p => {
    const isSel = yaSeleccionadas.has(p.codigo);
    return `
      <div class="tabla-row ${isSel ? 'seleccionada' : ''}" style="font-size: 12px; padding: 8px 10px; border-radius: 6px; margin-bottom: 2px;" onclick="agregarPracticaEd(${p.codigo})">
        <span class="codigo">${p.codigo}</span>
        <span class="nombre-prac">${p.nombre}</span>
        <span class="ub">${isSel ? '✓' : fmtUB(p.ub)}</span>
      </div>
    `;
  }).join('');

  if (total > limite) {
    html += `<div class="empty-state" style="font-size: 10px; padding: 6px;">Mostrando ${limite} de ${total}. Refina la búsqueda.</div>`;
  }
  cont.innerHTML = html;
}

function agregarPracticaEd(cod) {
  if (window._edBoton.codigos.includes(cod)) {
    // Si ya está, quitarla (toggle)
    window._edBoton.codigos = window._edBoton.codigos.filter(c => c !== cod);
    toast('Quitada');
  } else {
    window._edBoton.codigos.push(cod);
    toast('Agregada');
  }
  document.getElementById('ed-contador').textContent = window._edBoton.codigos.length + ' seleccionada(s)';
  renderEdSeleccionadas();
  renderEdResultados();
}

function guardarBotonEditado() {
  const b = window._edBoton;
  const sigla = (b.sigla || '').trim().toUpperCase();
  const nombre = (b.nombre || '').trim();

  if (!sigla) { toast('Falta la sigla'); document.getElementById('ed-sigla').focus(); return; }
  if (!nombre) { toast('Falta el nombre'); document.getElementById('ed-nombre').focus(); return; }
  if (b.codigos.length === 0) { toast('Agregá al menos una práctica'); return; }

  // Verificar sigla duplicada
  const siglaDup = state.botones.some((bt, i) =>
    bt.sigla === sigla && i !== window._edIdx
  );
  if (siglaDup) {
    toast(`La sigla "${sigla}" ya existe`);
    return;
  }

  const nuevoB = {
    sigla: sigla.substring(0, 5),
    nombre: nombre,
    codigos: [...b.codigos]
  };

  if (window._edEsNuevo) {
    state.botones.push(nuevoB);
  } else {
    state.botones[window._edIdx] = nuevoB;
  }

  guardar();
  cerrarEditorBoton();
  toast('✓ Botón guardado');
  render();
}

function cerrarEditorBoton() {
  const m = document.getElementById('modal-editor-boton');
  if (m) m.remove();
  delete window._edBoton;
  delete window._edEsNuevo;
  delete window._edIdx;
}

function abrirSelectorCodigos(codigosIniciales, callback) {
  let seleccionados = new Set(codigosIniciales);
  let busq = '';

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'modal-selector';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h2>SELECCIONAR PRÁCTICAS</h2>
        <button class="modal-close" onclick="cerrarSelector()">×</button>
      </div>
      <div class="modal-body" style="padding: 0;">
        <div style="padding: 12px;">
          <div class="search-box">
            <span class="search-icon">${iconos.search}</span>
            <input id="input-sel" type="text" placeholder="BUSCAR" oninput="filtrarSel(this.value)">
          </div>
          <div id="contador-sel" style="font-size: 11px; color: #666; text-align: center;">
            ${seleccionados.size} seleccionada(s)
          </div>
        </div>
        <div id="tabla-sel" style="max-height: 45vh; overflow-y: auto;"></div>
        <div style="padding: 12px; border-top: 1px solid #eee; display: flex; gap: 8px;">
          <button class="btn-secondary" style="margin: 0;" onclick="cerrarSelector()">CANCELAR</button>
          <button class="btn-primary" style="margin: 0;" onclick="confirmarSelector()">GUARDAR</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  window._selSeleccionados = seleccionados;
  window._selBusq = busq;
  window._selCallback = callback;

  renderTablaSel();
  setTimeout(() => document.getElementById('input-sel').focus(), 50);
}

function filtrarSel(v) {
  window._selBusq = v;
  renderTablaSel();
}

function renderTablaSel() {
  const cont = document.getElementById('tabla-sel');
  if (!cont) return;
  const q = (window._selBusq || '').toUpperCase().trim();
  const sel = window._selSeleccionados;

  let todas = [...PRACTICAS_NBU, ...state.practicasPropias];
  let resultados = q
    ? todas.filter(p => p.nombre.toUpperCase().includes(q) || String(p.codigo).includes(q))
    : todas.filter(p => sel.has(p.codigo)); // si no hay búsqueda, mostrar solo las seleccionadas

  resultados = resultados.slice(0, 60);

  if (resultados.length === 0) {
    cont.innerHTML = '<div class="empty-state">' + (q ? 'Sin resultados' : 'Buscá una práctica para agregarla') + '</div>';
    return;
  }

  cont.innerHTML = resultados.map(p => {
    const isSel = sel.has(p.codigo);
    return `
      <div class="tabla-row ${isSel ? 'seleccionada' : ''}" onclick="toggleSelCodigo(${p.codigo})">
        <span class="codigo">${p.codigo}</span>
        <span class="nombre-prac">${p.nombre}</span>
        <span class="ub">${isSel ? '✓' : fmtUB(p.ub)}</span>
      </div>
    `;
  }).join('');
}

function toggleSelCodigo(cod) {
  if (window._selSeleccionados.has(cod)) {
    window._selSeleccionados.delete(cod);
  } else {
    window._selSeleccionados.add(cod);
  }
  document.getElementById('contador-sel').textContent = window._selSeleccionados.size + ' seleccionada(s)';
  renderTablaSel();
}

function confirmarSelector() {
  const cb = window._selCallback;
  const sels = [...window._selSeleccionados];
  cerrarSelector();
  cb(sels);
}

function cerrarSelector() {
  const m = document.getElementById('modal-selector');
  if (m) m.remove();
  delete window._selSeleccionados;
  delete window._selBusq;
  delete window._selCallback;
}

function eliminarBoton(idx) {
  const b = state.botones[idx];
  if (!confirm(`¿Eliminar el botón "${b.sigla}"?`)) return;
  state.botones.splice(idx, 1);
  guardar();
  toast('Botón eliminado');
  render();
}

function restaurarBotonesDefault() {
  const cant = state.botones.length;
  let mensaje;
  if (cant === 0) {
    mensaje = `¿Cargar la botonera default (${BOTONES_DEFAULT.length} botones)?`;
  } else {
    mensaje = `¿Reemplazar los ${cant} botones actuales por la botonera default (${BOTONES_DEFAULT.length} botones)?\n\nEsta acción no se puede deshacer.`;
  }
  if (!confirm(mensaje)) return;
  state.botones = JSON.parse(JSON.stringify(BOTONES_DEFAULT));
  guardar();
  toast(`✓ ${state.botones.length} botones cargados`);
  render();
}

// ===== ATAJOS GLOBALES =====
window.addEventListener('keydown', (e) => {
  if (e.key === 'F8') {
    e.preventDefault();
    if (state.pantalla === 'seleccion') generarPresupuesto();
  }
  if (e.key === 'Escape') {
    const modal = document.querySelector('.modal-overlay');
    if (modal) modal.remove();
  }
});

// ===== STARTUP =====
cargar();
// Re-render reactivo cuando se cambia algo del nomenclador
window.addEventListener('storage', () => { cargar(); render(); });

// Render inicial
render();

// Service worker para offline (intento básico)
if ('serviceWorker' in navigator) {
  // Sin service worker external por ahora; la app igual funciona offline
  // porque todo está embebido (HTML+CSS+JS+datos)
}
</script>
</body>
</html>
